                  legatum_indices:
                    safety_and_security:
                      rank_2023: 139
                      score_2023: 51.6
                    governance:
                      rank_2023: 111
                      score_2023: 41.1
        "404":
          description: Country not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error: the requested resource could not be found
        "422":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              examples:
                invalid_include:
                  value:
                    error:
                      include: include contains unsupported value "foo"
                invalid_country_code:
                  value:
                    error:
                      country_code: must be exactly three English letters
                unknown_query_param:
                  value:
                    error:
                      query: unknown query parameter "foo"
components:
  schemas:
    HealthcheckEnvelope:
      type: object
      required: [status, system_info]
      properties:
        status:
          type: string
        system_info:
          type: object
          required: [environment, version]
          properties:
            environment:
              type: string
            version:
              type: string
    CitiesEnvelope:
      type: object
      required: [cities]
      properties:
        cities:
          type: array
          items:
            $ref: "#/components/schemas/City"
    CityEnvelope:
      type: object
      required: [city]
      properties:
        city:
          $ref: "#/components/schemas/City"
    CountriesEnvelope:
      type: object
      required: [countries]
      properties:
        countries:
          type: array
          items:
            $ref: "#/components/schemas/Country"
    CountryEnvelope:
      type: object
      required: [country]
      properties:
        country:
          $ref: "#/components/schemas/Country"
    ErrorEnvelope:
      type: object
      properties:
        error:
          oneOf:
            - type: string
            - type: object
              additionalProperties:
                type: string
    City:
      type: object
      required:
        - geoname_id
        - city
        - country_code
        - country
        - population
        - latitude
        - longitude
        - timezone
        - last_update
      properties:
        geoname_id:
          type: integer
        city:
          type: string
        state_code:
          type: string
        country_code:
          type: string
        country:
          type: string
        population:
          type: integer
          nullable: true
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        timezone:
          type: string
        last_update:
          type: string
        numbeo_cost:
          allOf:
            - $ref: "#/components/schemas/NumbeoCost"
          nullable: true
        numbeo_indices:
          allOf:
            - $ref: "#/components/schemas/NumbeoCityIndices"
          nullable: true
        avg_climate:
          allOf:
            - $ref: "#/components/schemas/AvgClimate"
          nullable: true
    Country:
      type: object
      required:
        - country_code
        - country
        - population
        - area
        - last_update
      properties:
        country_code:
          type: string
        country:
          type: string
        population:
          type: integer
          nullable: true
        area:
          type: integer
          nullable: true
        last_update:
          type: string
        numbeo_indices:
          allOf:
            - $ref: "#/components/schemas/NumbeoCountryIndices"
          nullable: true
        legatum_indices:
          allOf:
            - $ref: "#/components/schemas/LegatumCountryIndices"
          nullable: true
    NumbeoCost:
      type: object
      required: [currency, last_update, prices]
      properties:
        currency:
          type: string
        last_update:
          type: string
        prices:
          type: array
          items:
            $ref: "#/components/schemas/Price"
    Price:
      type: object
      required: [category, param]
      properties:
        category:
          type: string
        param:
          type: string
        cost:
          type: number
          format: double
          nullable: true
        range_lower:
          type: number
          format: double
          nullable: true
        range_upper:
          type: number
          format: double
          nullable: true
    NumbeoCityIndices:
      type: object
      properties:
        cost_of_living: { type: number, format: double, nullable: true }
        rent: { type: number, format: double, nullable: true }
        cost_of_living_plus_rent:
          { type: number, format: double, nullable: true }
        groceries: { type: number, format: double, nullable: true }
        local_purchasing_power: { type: number, format: double, nullable: true }
        quality_of_life: { type: number, format: double, nullable: true }
        property_price_to_income_ratio:
          { type: number, format: double, nullable: true }
        traffic_commute_time: { type: number, format: double, nullable: true }
        climate: { type: number, format: double, nullable: true }
        safety: { type: number, format: double, nullable: true }
        health_care: { type: number, format: double, nullable: true }
        pollution: { type: number, format: double, nullable: true }
        last_update: { type: string }
    NumbeoCountryIndices:
      type: object
      properties:
        cost_of_living: { type: number, format: double, nullable: true }
        rent: { type: number, format: double, nullable: true }
        cost_of_living_plus_rent:
          { type: number, format: double, nullable: true }
        groceries: { type: number, format: double, nullable: true }
        restaurant_price: { type: number, format: double, nullable: true }
        local_purchasing_power: { type: number, format: double, nullable: true }
        quality_of_life: { type: number, format: double, nullable: true }
        property_price_to_income_ratio:
          { type: number, format: double, nullable: true }
        traffic_commute_time: { type: number, format: double, nullable: true }
        climate: { type: number, format: double, nullable: true }
        safety: { type: number, format: double, nullable: true }
        health_care: { type: number, format: double, nullable: true }
        pollution: { type: number, format: double, nullable: true }
        avg_salary_usd: { type: number, format: double, nullable: true }
        last_update: { type: string }
    AvgClimate:
      type: object
      properties:
        high_temp: { $ref: "#/components/schemas/MonthlySeries" }
        low_temp: { $ref: "#/components/schemas/MonthlySeries" }
        pressure: { $ref: "#/components/schemas/MonthlySeries" }
        wind_speed: { $ref: "#/components/schemas/MonthlySeries" }
        humidity: { $ref: "#/components/schemas/MonthlySeries" }
        rainfall: { $ref: "#/components/schemas/MonthlySeries" }
        rainfall_days: { $ref: "#/components/schemas/MonthlySeries" }
        snowfall: { $ref: "#/components/schemas/MonthlySeries" }
        snowfall_days: { $ref: "#/components/schemas/MonthlySeries" }
        sea_temp: { $ref: "#/components/schemas/MonthlySeries" }
        daylight: { $ref: "#/components/schemas/MonthlySeries" }
        sunshine: { $ref: "#/components/schemas/MonthlySeries" }
        sunshine_days: { $ref: "#/components/schemas/MonthlySeries" }
        uv_index: { $ref: "#/components/schemas/MonthlySeries" }
        cloud_cover: { $ref: "#/components/schemas/MonthlySeries" }
        visibility: { $ref: "#/components/schemas/MonthlySeries" }
    MonthlySeries:
      type: array
      minItems: 12
      maxItems: 12
      items:
        type: number
        format: double
        nullable: true
    LegatumCountryIndices:
      type: object
      properties:

                        13,
                        17.6,
                        22.8,
                        25.1,
                        29.3,
                        31,
                        26.8,
                        21.6,
                        16.5,
                        11.2,
                      ]
                    low_temp:
                      [
                        2.8,
                        3.5,
                        6.2,
                        10.6,
                        16.1,
                        19.3,
                        23.3,
                        25.1,
                        21.3,
                        16.3,
                        10.9,
                        5.9,
                      ]
                    sea_temp:
                      [
                        15.7,

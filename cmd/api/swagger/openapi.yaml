openapi: 3.0.3
info:
  title: Relohelper API
  version: 0.1.0
  description: |
    OpenAPI documentation for the current cities and countries REST API.
servers:
  - url: /
tags:
  - name: Health
  - name: Cities
  - name: Countries
paths:
  /healthcheck:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Service health status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthcheckEnvelope"
              example:
                status: available
                system_info:
                  environment: development
                  version: "0.1.0"
        "422":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
              example:
                error:
                  query: unknown query parameter "foo"
  /cities:
    get:
      tags: [Cities]
      summary: List cities or fetch a city batch by geoname ids
      parameters:
        - name: country_code
          in: query
          schema:
            type: string
          example: JPN
          description: Case-insensitive country filter for list mode.
        - name: ids
          in: query
          schema:
            type: string
          example: 1850147,5128581
          description: |
            Comma-separated batch of positive geoname ids.
            Maximum 100 unique values.
            When present, the endpoint works in batch mode.
        - name: include
          in: query
          schema:
            type: string
          example: numbeo_cost,numbeo_indices,avg_climate
          description: |
            Comma-separated include values.
            List mode supports only country.
            Batch mode supports country, numbeo_cost, numbeo_indices, avg_climate.
            When detailed include blocks are requested, the batch limit is 20 unique ids.
      responses:
        "200":
          description: City list or batch result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitiesEnvelope"
              examples:
                list:
                  summary: Real list response fragment
                  value:
                    cities:
                      - geoname_id: 1489425
                        city: Tomsk
                        country_code: RUS
                        country: Russian Federation
                        population: 574002
                        latitude: 56.50032
                        longitude: 84.98204
                        timezone: Asia/Tomsk
                        last_update: "2026-03-12"
                      - geoname_id: 1614295
                        city: Pattaya
                        country_code: THA
                        country: Thailand
                        population: 116417
                        latitude: 12.93333
                        longitude: 100.88333
                        timezone: Asia/Bangkok
                        last_update: "2026-03-12"
                      - geoname_id: 1850147
                        city: Tokyo
                        country_code: JPN
                        country: Japan
                        population: 9733276
                        latitude: 35.6895
                        longitude: 139.69171
                        timezone: Asia/Tokyo
                        last_update: "2026-03-12"
                      - geoname_id: 5128581
                        city: New York
                        state_code: US-NY
                        country_code: USA
                        country: United States of America
                        population: 8804190
                        latitude: 40.71427
                        longitude: -74.00597
                        timezone: America/New_York
                        last_update: "2026-03-12"
                filtered_by_country:
                  summary: Real filtered list response fragment for country_code=rus
                  value:
                    cities:
                      - geoname_id: 524901
                        city: Moscow
                        country_code: RUS
                        country: Russian Federation
                        population: 10381222
                        latitude: 55.75222
                        longitude: 37.61556
                        timezone: Europe/Moscow
                        last_update: "2026-03-12"
                      - geoname_id: 1489425
                        city: Tomsk
                        country_code: RUS
                        country: Russian Federation
                        population: 574002
                        latitude: 56.50032
                        longitude: 84.98204
                        timezone: Asia/Tomsk
                        last_update: "2026-03-12"
                      - geoname_id: 2013348
                        city: Vladivostok
                        country_code: RUS
                        country: Russian Federation
                        population: 604901
                        latitude: 43.10562
                        longitude: 131.87353
                        timezone: Asia/Vladivostok
                        last_update: "2026-03-12"
                batch:
                  summary: Real batch response fragment with include
                  value:
                    cities:
                      - geoname_id: 2147714
                        city: Sydney
                        country_code: AUS
